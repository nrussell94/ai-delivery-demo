openapi: 3.0.3
info:
  title: Demo API
  version: 0.1.0
servers:
  - url: http://localhost:8080
paths:
  /api/health:
    get:
      tags:
        - health
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/weather/warmest-day:
    get:
      tags:
        - weather
      summary: Get the warmest day in the next 5 days for a UK location
      operationId: getWarmestDay
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: string
            pattern: '^-?\d{1,3}(\.\d{1,6})?$'
          description: Latitude (up to 6 decimal places)
        - name: lon
          in: query
          required: true
          schema:
            type: string
            pattern: '^-?\d{1,3}(\.\d{1,6})?$'
          description: Longitude (up to 6 decimal places)
      responses:
        "200":
          description: The warmest day over the next 5 calendar days
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WarmestDayResponse"
        "400":
          description: Invalid lat/lon (e.g. more than 6 decimal places)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "422":
          description: Location is not in the United Kingdom
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "502":
          description: Upstream weather service error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
tags:
  - name: weather
    description: Weather forecast endpoints
components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok
    WarmestDayResponse:
      type: object
      required:
        - date
        - temperatureCelsius
        - humidityPercent
      properties:
        date:
          type: string
          format: date
          example: "2026-05-21"
        temperatureCelsius:
          type: number
          format: double
          example: 18.5
        humidityPercent:
          type: integer
          example: 65
    MessageResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: "Location is not within the United Kingdom"
