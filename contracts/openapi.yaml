openapi: 3.0.3
info:
  title: Demo API
  version: 0.1.0
servers:
  - url: http://localhost:8080
paths:
  /api/health:
    get:
      tags:
        - health
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/claims:
    post:
      tags:
        - claims
      operationId: createClaim
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimRequest"
      responses:
        "201":
          description: Claim logged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Claim"
        "400":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      tags:
        - claims
      operationId: listClaims
      parameters:
        - in: query
          name: policyId
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Claims for the given policy, newest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Claim"
        "400":
          description: Missing or blank policyId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok
    IncidentType:
      type: string
      enum:
        - COLLISION
        - THEFT
        - GLASS
        - FIRE
        - OTHER
    ClaimStatus:
      type: string
      enum:
        - OPEN
    ClaimRequest:
      type: object
      required:
        - policyId
        - incidentAt
        - incidentType
        - description
        - reportedBy
      properties:
        policyId:
          type: string
          minLength: 1
          example: POL-123
        incidentAt:
          type: string
          format: date-time
          example: "2026-05-18T09:00:00Z"
        incidentType:
          $ref: "#/components/schemas/IncidentType"
        description:
          type: string
          minLength: 1
          maxLength: 2000
          example: Side mirror clipped by van on a left turn; caller was stationary
        reportedBy:
          type: string
          minLength: 1
          example: Sam Quinn
    Claim:
      type: object
      required:
        - claimReference
        - policyId
        - incidentAt
        - incidentType
        - description
        - reportedBy
        - status
        - createdAt
      properties:
        claimReference:
          type: string
          example: FNOL-7K2QH9XR
        policyId:
          type: string
          example: POL-123
        incidentAt:
          type: string
          format: date-time
        incidentType:
          $ref: "#/components/schemas/IncidentType"
        description:
          type: string
        reportedBy:
          type: string
        status:
          $ref: "#/components/schemas/ClaimStatus"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: Incident date is in the future
