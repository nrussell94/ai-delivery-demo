services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:sqlite:/data/demo.db
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - sqlite-data:/data

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "5173:5173"

volumes:
  sqlite-data:
